<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adeeb Tech Lab Dashboard</title>
    <style>
        :root {
            --bg: #0a0e14;
            --card: #1c222d;
            --neon: #39FF14;
            --off: #444;
            --red: #ff4444;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with Image */
        .header-section {
            height: 30vh;
            background: linear-gradient(to bottom, rgba(10,14,20,0.2), var(--bg)), 
                        url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=600') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        /* Beautiful Status Buttons */
        .status-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--off);
            padding: 10px 18px;
            border-radius: 25px;
            color: var(--off);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-btn.connected {
            color: var(--neon);
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            background: rgba(57, 255, 20, 0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; text-align: center; letter-spacing: 1px; }

        /* Grid - Scaled for Mobile */
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            padding: 15px;
            overflow: hidden;
        }

        .relay-btn {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .relay-btn svg { width: 30px; height: 30px; fill: var(--off); transition: 0.3s; }
        .relay-btn span { margin-top: 8px; font-size: 12px; color: var(--off); font-weight: bold; }

        /* Relay On State */
        .relay-btn.on {
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }
        .relay-btn.on svg { fill: var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }
        .relay-btn.on span { color: var(--neon); }

        /* Footer with ALL OFF */
        .footer-section {
            padding: 15px;
            background: var(--bg);
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .all-off-btn {
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
            padding: 12px 0;
            width: 80%;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .all-off-btn:active { background: var(--red); color: white; }

    </style>
</head>
<body>

    <header class="header-section">
        <div class="status-row">
            <div id="wifi-btn" class="status-btn" onclick="handleConnect('wifi')">📶 WiFi</div>
            <div id="ble-btn" class="status-btn" onclick="handleConnect('ble')">ᛒ Bluetooth</div>
        </div>
        <h1>Adeeb Technology Lab</h1>
    </header>

    <main class="grid-container">
        <button class="relay-btn" onclick="toggleRelay(1, this)">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
            <span>Light 1</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(2, this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm10-1h-3.05c-.25-2.24-1.28-4.22-2.82-5.71l2.16-2.16-1.41-1.41-2.16 2.16C13.22 3.33 11.24 2.3 9 2.05V1h-2v1.05C4.76 2.3 2.78 3.33 1.29 4.87l-2.16-2.16-1.41 1.41 2.16 2.16C1.33 7.78.3 9.76.05 12H1v2h.05c.25 2.24 1.28 4.22 2.82 5.71l-2.16 2.16 1.41 1.41 2.16-2.16C4.78 20.67 6.76 21.7 9 21.95V23h2v-1.05c2.24-.25 4.22-1.28 5.71-2.82l2.16 2.16 1.41-1.41-2.16-2.16c1.54-1.49 2.57-3.47 2.82-5.71H23v-2z"/></svg>
            <span>Fan</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(3, this)">
            <svg viewBox="0 0 24 24"><path d="M22 19V9H2V19H22M12 10.5C13.1 10.5 14 11.4 14 12.5S13.1 14.5 12 14.5 10 13.6 10 12.5 10.9 10.5 12 10.5M7 11H5V13H7V11M5 14H7V16H5V14M19 11H17V13H19V11M17 14H19V16H17V14Z"/></svg>
            <span>Hardware</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(4, this)">
            <svg viewBox="0 0 24 24"><path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M19 19H5V5H19V19M7 10H17V12H7V10M7 14H17V16H7V14Z"/></svg>
            <span>Studio</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(5, this)">
            <svg viewBox="0 0 24 24"><path d="M5 4v2h14V4H5zm10 12v6h2v-6h-2zm-4 0v6h2v-6h-2zM5 8v2h14V8H5zm0 4v2h14v-2H5z"/></svg>
            <span>ClassRoom</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(6, this)">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
            <span>Light 2</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(7, this)">
            <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
            <span>Printer</span>
        </button>
        <button class="relay-btn" onclick="toggleRelay(8, this)">
            <svg viewBox="0 0 24 24"><path d="M13,3H6V21H18V8L13,3M13,4.5L16.5,8H13V4.5M7,19V4H12V9H17V19H7Z"/></svg>
            <span>LED Name</span>
        </button>
    </main>

    <footer class="footer-section">
        <button class="all-off-btn" onclick="allOff()">ALL OFF</button>
    </footer>

    <script>
        // 1. Toggle Relays
        function toggleRelay(id, el) {
            el.classList.toggle('on');
            fetch(`/toggle?id=${id}`).catch(err => console.log("ESP32 Offline"));
        }

        // 2. WiFi and BLE Logic
        function handleConnect(type) {
            const btn = document.getElementById(type + '-btn');
            const endpoint = (type === 'wifi') ? '/connect-wifi' : '/start-ble';
            
            // Visual toggle
            btn.classList.toggle('connected');

            fetch(endpoint)
                .then(r => console.log(type + " command sent"))
                .catch(e => console.log("ESP32 Communication Error"));
        }

        // 3. Master Off
        function allOff() {
            fetch('/alloff').then(() => {
                document.querySelectorAll('.relay-btn').forEach(b => b.classList.remove('on'));
            });
        }
    </script>
</body>
</html>
