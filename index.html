<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Channel Dual Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Relay Control Hub</h1>
            <div class="connection-panel">
                <div class="button-row">
                    <button id="btConnect" class="conn-btn bt">🔗 Bluetooth</button>
                    <button id="wifiStatus" class="conn-btn wifi" onclick="checkWifi()">🌐 Check Wi-Fi</button>
                </div>
                <input type="text" id="ipAddress" value="192.168.4.1" placeholder="Enter ESP32 IP">
                <p id="status">Status: Disconnected</p>
            </div>
        </header>

        <div class="relay-grid" id="relayGrid">
            <!-- Buttons 1-8 generated by JS -->
        </div>

        <footer>
            <button class="master-off" onclick="allOff()">⚠️ MASTER ALL OFF</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
