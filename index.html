<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adeeb Tech Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="hero-header">
            <div class="overlay"></div>
            <div class="header-top">
                <!-- High-visibility ALL OFF button -->
                <button class="header-off-btn" onclick="allOff()">ALL OFF</button>
            </div>
            <div class="header-main">
                <h1>Adeeb Technology Lab</h1>
                <p>Hardware Status: <span id="conn-stat" class="status-off">OFFLINE</span></p>
            </div>
        </header>

        <div class="conn-bar">
            <button id="ble-btn" class="c-btn" onclick="scanBluetooth()">ᛒ</button>
            <button id="wifi-btn" class="c-btn" onclick="scanWiFi()">📶</button>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <main class="control-grid">
            <div class="card" onclick="toggle(1, this)" data-type="yellow">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .6.4 1 1 1h6c.6 0 1-.4 1-1v-2.3c1.8-1.2 3-3.3 3-5.7 0-3.9-3.1-7-7-7z"/></svg>
                <span>Light 1</span>
            </div>
            <div class="card" onclick="toggle(2, this)" data-type="green">
                <svg viewBox="0 0 24 24"><path d="M12,11A1,1 0 0,0 11,12A1,1 0 0,0 12,13A1,1 0 0,0 13,12A1,1 0 0,0 12,11M12.5,2C11,2 11,3.5 11,3.5V8.2C9.5,8.5 8.5,9.5 8.2,11H3.5C3.5,11 2,11 2,12.5C2,14 3.5,14 3.5,14H8.2C8.5,15.5 9.5,16.5 11,16.8V21.5C11,21.5 11,23 12.5,23C14,23 14,21.5 14,21.5V16.8C15.5,16.5 16.5,15.5 16.8,14H21.5C21.5,14 23,14 23,12.5C23,11 21.5,11 21.5,11H16.8C16.5,9.5 15.5,8.5 14,8.2V3.5C14,3.5 14,2 12.5,2Z"/></svg>
                <span>Fan</span>
            </div>
            <div class="card" onclick="toggle(3, this)" data-type="green">
                <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
                <span>Hardware</span>
            </div>
            <div class="card" onclick="toggle(4, this)" data-type="green">
                <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
                <span>Studio</span>
            </div>
            <div class="card" onclick="toggle(5, this)" data-type="green">
                <svg viewBox="0 0 24 24"><path d="M5 4v2h14V4H5zm10 12v6h2v-6h-2zm-4 0v6h2v-6h-2zM5 8v2h14V8H5zm0 4v2h14v-2H5z"/></svg>
                <span>Classroom</span>
            </div>
            <div class="card" onclick="toggle(6, this)" data-type="yellow">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .6.4 1 1 1h6c.6 0 1-.4 1-1v-2.3c1.8-1.2 3-3.3 3-5.7 0-3.9-3.1-7-7-7z"/></svg>
                <span>Light 2</span>
            </div>
            <div class="card" onclick="toggle(7, this)" data-type="green">
                <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.7 0-3 1.3-3 3v6h4v4h12v-4h4v-6c0-1.7-1.3-3-3-3zm-3 11H8v-5h8v5zm3-7c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm-1-9H6v4h12V3z"/></svg>
                <span>Printer</span>
            </div>
            <div class="card" onclick="toggle(8, this)" data-type="green">
                <span class="atl">ATL<sub>AB</sub></span>
                <span>LED Name</span>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
