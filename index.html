<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Channel Control Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Functional Connection Hub -->
        <header class="connection-hub">
            <div class="status-indicators">
                <div id="wifi-status" class="status-node">🌐 Wi-Fi</div>
                <div id="bt-status" class="status-node">ᛒ Bluetooth</div>
            </div>
            <div class="action-buttons">
                <button id="btConnect" class="control-btn bt">Connect BT</button>
                <!-- This button now actively verifies the Wi-Fi handshake -->
                <button onclick="connectToESP32Wifi()" class="control-btn wifi">Connect Wi-Fi</button>
            </div>
            <p id="main-status">System: <span class="offline">Offline</span></p>
            <div class="time-display" id="clock">00:00:00</div>
        </header>

        <!-- Relay Control Grid -->
        <main class="control-grid" id="relayGrid">
            <!-- Buttons injected via JS -->
        </main>

        <footer class="bottom-bar">
            <button class="master-kill" onclick="allOff()">⚠️ MASTER ALL OFF</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
