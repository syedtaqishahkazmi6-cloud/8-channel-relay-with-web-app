<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adeeb Tech Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="header-overlay"></div>
            <div class="header-content">
                <div class="top-nav">
                    <span class="icon-btn"></span>
                    <span class="icon-btn"></span>
                </div>
                <h1>Adeeb Technology Lab</h1>
                <p id="conn-status">is ➜ <span class="status-text">Disconnect</span></p>
                
                <div class="quick-icons">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
        </header>

        <div class="control-bar">
            <button id="ble-btn" class="conn-btn" onclick="toggleConnection('ble')">ᛒ</button>
            <button id="wifi-btn" class="conn-btn" onclick="toggleConnection('wifi')">📶</button>
            <div class="timestamp" id="timer">03/11/2026 11:28:54 PM</div>
        </div>

        <main class="relay-grid">
            <button class="relay-card" onclick="toggleRelay(1, this)" data-type="light">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(2, this)" data-type="fan">
                <svg viewBox="0 0 24 24"><path d="M12 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm10-1h-3.05c-.25-2.24-1.28-4.22-2.82-5.71l2.16-2.16-1.41-1.41-2.16 2.16C13.22 3.33 11.24 2.3 9 2.05V1h-2v1.05C4.76 2.3 2.78 3.33 1.29 4.87l-2.16-2.16-1.41 1.41 2.16 2.16C1.33 7.78.3 9.76.05 12H1v2h.05c.25 2.24 1.28 4.22 2.82 5.71l-2.16 2.16 1.41 1.41 2.16-2.16C4.78 20.67 6.76 21.7 9 21.95V23h2v-1.05c2.24-.25 4.22-1.28 5.71-2.82l2.16 2.16 1.41-1.41-2.16-2.16c1.54-1.49 2.57-3.47 2.82-5.71H23v-2z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(3, this)" data-type="hw">
                <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(4, this)" data-type="studio">
                <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(5, this)" data-type="classroom">
                <svg viewBox="0 0 24 24"><path d="M5 4v2h14V4H5zm10 12v6h2v-6h-2zm-4 0v6h2v-6h-2zM5 8v2h14V8H5zm0 4v2h14v-2H5z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(6, this)" data-type="light">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(7, this)" data-type="printer">
                <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
            </button>
            <button class="relay-card" onclick="toggleRelay(8, this)" data-type="atlab">
                <span class="text-icon">ATL<sub>AB</sub></span>
            </button>
        </main>

        <footer class="main-footer">
            <button class="all-off-btn" onclick="masterOff()">ALL OFF</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
